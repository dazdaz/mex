<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertex AI Dual Panel App</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="container">
        <header>
            <h1>Vertex AI Dual Panel</h1>
            <p>Query two different models or prompts side-by-side.</p>
        </header>

        <div class="grid">
            <article id="panel-1" class="panel">
                <form class="panel-form">
                    <label for="model-1">Select Model</label>
                    <select id="model-1" name="model">
                        {% for model in models %}
                        <option value="{{ model }}">{{ model }}</option>
                        {% endfor %}
                    </select>
                    <label for="prompt-1">Enter Prompt</label>
                    <textarea id="prompt-1" name="prompt" rows="8" placeholder="e.g., Write a Python function to reverse a string."></textarea>
                    <button type="submit">Generate</button>
                </form>
                <footer>
                    <small>Response:</small>
                    <div class="response-area" aria-busy="false">
                        <pre><code>Your response will appear here...</code></pre>
                    </div>
                </footer>
            </article>

            <article id="panel-2" class="panel">
                <form class="panel-form">
                    <label for="model-2">Select Model</label>
                    <select id="model-2" name="model">
                        {% for model in models %}
                        <option value="{{ model }}">{{ model }}</option>
                        {% endfor %}
                    </select>
                    <label for="prompt-2">Enter Prompt</label>
                    <textarea id="prompt-2" name="prompt" rows="8" placeholder="e.g., Explain the concept of recursion in simple terms."></textarea>
                    <button type="submit">Generate</button>
                </form>
                <footer>
                    <small>Response:</small>
                    <div class="response-area" aria-busy="false">
                        <pre><code>Your response will appear here...</code></pre>
                    </div>
                </footer>
            </article>
        </div>
    </main>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
